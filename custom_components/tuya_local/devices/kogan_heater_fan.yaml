name: Heater fan
products:
  - id: 298d4482592b6b87426bda540d91d268
    manufacturer: Kogan
    model: Heater fan
entities:
  - entity: climate
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: heater
            conditions:
              - dps_val: true
                value: heat
              - dps_val: false
                value: fan_only
      - id: 101
        type: boolean
        name: heater
        hidden: true
      - id: 20
        type: integer
        name: temperature
        range:
          min: 15
          max: 35
        unit: C
      - id: 21
        type: integer
        name: current_temperature
      - id: 2
        type: string
        name: fan_mode
        mapping:
          - dps_val: strong
            value: high
          - constraint: speed
            conditions:
              - dps_val: 1
                value: low
              - dps_val: 2
                value: low
              - dps_val: 3
                value: low
              - dps_val: 4
                value: medium
              - dps_val: 5
                value: medium
              - dps_val: 6
                value: medium
              - dps_val: 7
                value: medium
              - dps_val: 8
                value: medium
              - dps_val: 9
                value: medium
      - id: 3
        type: integer
        name: speed
        hidden: true
      - id: 5
        type: boolean
        name: swing_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: "on"
  - entity: number
    name: Heat level
    category: config
    dps:
      - id: 102
        type: integer
        name: value
        range:
          min: 0
          max: 2
  - entity: switch
    translation_key: sound
    category: config
    dps:
      - id: 13
        type: boolean
        name: switch
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 22
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: 1h
            value: 1h
          - dps_val: 2h
            value: 2h
          - dps_val: 3h
            value: 3h
          - dps_val: 4h
            value: 4h
          - dps_val: 5h
            value: 5h
          - dps_val: 6h
            value: 6h
  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 23
        type: integer
        name: sensor
        unit: min
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 24
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 24
        type: bitfield
        name: fault_code
